name: Build PlayerBots

on:
  push:
    branches: [ test/playerbots ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

env:
  BUILD_TYPE: ${{ inputs.build_type || 'Release' }}
  VCPKG_ROOT: C:\vcpkg
  TRIPLET: x64-windows

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        shell: powershell
        run: |
          $vcpkgPath = $env:VCPKG_ROOT
          if (-not (Test-Path $vcpkgPath)) {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkgPath
            & "$vcpkgPath\bootstrap-vcpkg.bat" -disableMetrics
          }

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-playerbots-${{ runner.os }}-${{ env.TRIPLET }}-${{ hashFiles('.github/workflows/build-playerbots.yml') }}
          restore-keys: |
            vcpkg-playerbots-${{ runner.os }}-${{ env.TRIPLET }}-

      - name: Install ACE via vcpkg
        shell: powershell
        run: |
          $aceDll = Join-Path $env:VCPKG_ROOT "installed\${{ env.TRIPLET }}\bin\ACE.dll"
          if (-not (Test-Path $aceDll)) {
            & "$env:VCPKG_ROOT\vcpkg" install ace:${{ env.TRIPLET }}
          }
          $aceRoot = Join-Path $env:VCPKG_ROOT "installed\${{ env.TRIPLET }}"
          echo "ACE_ROOT=$aceRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install OpenSSL & Boost via vcpkg
        shell: powershell
        run: |
          $osslDll = Join-Path $env:VCPKG_ROOT "installed\${{ env.TRIPLET }}\bin\libcrypto-3-x64.dll"
          if (-not (Test-Path $osslDll)) {
            & "$env:VCPKG_ROOT\vcpkg" install openssl:${{ env.TRIPLET }} boost:${{ env.TRIPLET }}
          }

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 ^
            -DACE_ROOT="${{ env.ACE_ROOT }}" ^
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}\scripts\buildsystems\vcpkg.cmake" ^
            -DCMAKE_PREFIX_PATH="${{ env.ACE_ROOT }}" ^
            -DALLOW_TURTLE_ADDONS=ON ^
            -DBUILD_PLAYERBOTS=ON ^
            -DUSE_STD_MALLOC=ON ^
            -DUSE_SCRIPTS=ON ^
            -DUSE_ANTICHEAT=ON ^
            -DUSE_DISCORD_BOT=OFF ^
            -DUSE_EXTRACTORS=OFF ^
            -DUSE_LIBCURL=OFF ^
            -DUSE_TRACY=OFF ^
            -DCMAKE_CXX_FLAGS="/EHsc /wd4996 /wd4355 /wd4244 /wd4267 /MP /utf-8"

      - name: Build
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 8

      - name: Copy DLLs to output
        shell: powershell
        run: |
          $binDir = "bin\${{ env.BUILD_TYPE }}"
          New-Item -Path $binDir -ItemType Directory -Force | Out-Null
          Copy-Item -Path "${{ env.ACE_ROOT }}\bin\ACE.dll" -Destination $binDir -Force
          Copy-Item -Path "${{ env.ACE_ROOT }}\bin\libcrypto-3-x64.dll" -Destination $binDir -Force
          Copy-Item -Path "${{ env.ACE_ROOT }}\bin\libssl-3-x64.dll" -Destination $binDir -Force

      - name: Upload mangosd artifact
        uses: actions/upload-artifact@v4
        with:
          name: mangosd-playerbots-${{ runner.os }}-${{ env.BUILD_TYPE }}
          path: |
            bin/${{ env.BUILD_TYPE }}/mangosd.exe
            bin/${{ env.BUILD_TYPE }}/realmd.exe
            bin/${{ env.BUILD_TYPE }}/ACE.dll
            bin/${{ env.BUILD_TYPE }}/libcrypto-3-x64.dll
            bin/${{ env.BUILD_TYPE }}/libssl-3-x64.dll
          if-no-files-found: error

      - name: Upload CMake logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
