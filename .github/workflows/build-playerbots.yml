name: Build PlayerBots

on:
  push:
    branches: [ test/playerbots ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

env:
  ACE_ROOT: C:\vcpkg\installed\x64-windows

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # needed for pushing to build-artifacts branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        run: |
          if (Test-Path C:\vcpkg) {
            Write-Output "C:\vcpkg already exists, skipping clone"
          } else {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
            & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-playerbots-${{ runner.os }}-${{ hashFiles('.github/workflows/build-playerbots.yml') }}
          restore-keys: |
            vcpkg-playerbots-${{ runner.os }}-

      - name: Install ACE via vcpkg
        run: |
          C:\vcpkg\vcpkg install ace --triplet x64-windows
          echo "ACE_ROOT=C:\vcpkg\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install OpenSSL & Boost via vcpkg
        run: |
          C:\vcpkg\vcpkg install openssl boost --triplet x64-windows

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 ^
            -DACE_ROOT="C:\vcpkg\installed\x64-windows" ^
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" ^
            -DCMAKE_PREFIX_PATH="C:\vcpkg\installed\x64-windows" ^
            -DOPENSSL_INCLUDE_DIR="C:\vcpkg\installed\x64-windows\include" ^
            -DOPENSSL_LIBRARIES="C:\vcpkg\installed\x64-windows\lib\libssl.lib;C:\vcpkg\installed\x64-windows\lib\libcrypto.lib" ^
            -DALLOW_TURTLE_ADDONS=ON ^
            -DBUILD_PLAYERBOTS=ON ^
            -DUSE_STD_MALLOC=ON ^
            -DUSE_SCRIPTS=ON ^
            -DUSE_ANTICHEAT=ON ^
            -DUSE_DISCORD_BOT=OFF ^
            -DUSE_EXTRACTORS=OFF ^
            -DUSE_LIBCURL=OFF ^
            -DUSE_TRACY=OFF ^
            -DCMAKE_CXX_FLAGS="/EHsc /wd4996 /wd4355 /wd4244 /wd4267 /MP /utf-8"

      - name: Build
        run: |
          cmake --build build --config ${{ inputs.build_type || 'Release' }} --parallel

      - name: Copy DLLs to output
        shell: cmd
        run: |
          copy C:\vcpkg\installed\x64-windows\bin\ACE.dll bin\${{ inputs.build_type || 'Release' }}\
          copy C:\vcpkg\installed\x64-windows\bin\libcrypto-3-x64.dll bin\${{ inputs.build_type || 'Release' }}\
          copy C:\vcpkg\installed\x64-windows\bin\libssl-3-x64.dll bin\${{ inputs.build_type || 'Release' }}\
          copy C:\vcpkg\installed\x64-windows\bin\boost*.dll bin\${{ inputs.build_type || 'Release' }}\

      - name: Upload mangosd artifact
        uses: actions/upload-artifact@v4
        with:
          name: mangosd-playerbots-${{ runner.os }}-${{ inputs.build_type || 'Release' }}
          path: |
            bin/${{ inputs.build_type || 'Release' }}/mangosd.exe
            bin/${{ inputs.build_type || 'Release' }}/realmd.exe
            bin/${{ inputs.build_type || 'Release' }}/ACE.dll
            bin/${{ inputs.build_type || 'Release' }}/libcrypto-3-x64.dll
            bin/${{ inputs.build_type || 'Release' }}/libssl-3-x64.dll
            bin/${{ inputs.build_type || 'Release' }}/boost*.dll
            bin/${{ inputs.build_type || 'Release' }}/mangosd.map
          if-no-files-found: error

      - name: Push to build-artifacts branch
        shell: pwsh
        run: |
          $BIN = "bin/${{ inputs.build_type || 'Release' }}"
          $MSG = "Build ${{ github.sha }} #${{ github.run_number }}"
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git fetch origin build-artifacts 2>$null
          git checkout build-artifacts 2>$null
          if ($LASTEXITCODE -ne 0) {
            git checkout --orphan build-artifacts
            git rm -rf --quiet . 2>$null
          }
          copy "$BIN\mangosd.exe" .\ -Force
          copy "$BIN\mangosd.map" .\ -Force
          copy "$BIN\ACE.dll"      .\ -Force
          copy "$BIN\libcrypto-3-x64.dll" .\ -Force
          copy "$BIN\libssl-3-x64.dll"    .\ -Force
          copy "$BIN\boost*.dll"   .\ -Force
          git add mangosd.exe mangosd.map ACE.dll libcrypto-3-x64.dll libssl-3-x64.dll boost*.dll 2>$null
          git commit -m $MSG --allow-empty
          git push origin build-artifacts --force

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/CMakeFiles/CMakeOutput.log
          if-no-files-found: ignore
